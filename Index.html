<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi PRECIOSA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        body {
            margin: 0;
            background-color: #0a0a0a;
            color: white;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* Pantalla de Inicio */
        #portada {
            display: flex;
            flex-direction: column;
            gap: 25px;
            animation: fadeIn 1.5s ease;
        }

        h1 { 
            font-family: 'Dancing Script', cursive; 
            font-size: 4.5rem; 
            color: #ffeb3b; 
            margin: 0; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 235, 59, 0.4);
        }

        .subtitulo { font-size: 1.1rem; border-top: 1px solid rgba(255,255,255,0.2); border-bottom: 1px solid rgba(255,255,255,0.2); padding: 10px 0; letter-spacing: 4px; text-transform: uppercase; opacity: 0.9; }

        .btn-regalo {
            padding: 18px 45px;
            font-size: 1.1rem;
            background: transparent;
            color: #ffeb3b;
            border: 2px solid #ffeb3b;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.4s all;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        .btn-regalo:hover { background: #ffeb3b; color: black; box-shadow: 0 0 30px #ffeb3b; transform: scale(1.05); }

        /* Sección de Flores */
        #seccion-flores {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 2s ease forwards;
            padding: 20px;
        }

        .flower { position: relative; width: 140px; height: 140px; margin-bottom: 20px; transform: scale(0.9); }
        .petal { 
            position: absolute; width: 50px; height: 85px; background: #ffd700; 
            border-radius: 50% 50% 0 50%; top: -40px; left: 45px;
            transform-origin: bottom center; border: 1px solid #e6c300;
        }
        .center { 
            position: absolute; width: 40px; height: 40px; background: #4b321c; 
            border-radius: 50%; top: 40px; left: 50px; z-index: 10;
        }
        .stem { width: 10px; height: 120px; background: linear-gradient(#2d5a27, #1e3d1a); border-radius: 6px; }

        /* Mensaje Final Corregido y Personalizado */
        .mensaje-final {
            margin-top: 25px;
            color: #ffeb3b;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem; /* Ajustado para que quepa el texto largo */
            max-width: 500px;
            line-height: 1.5;
            white-space: pre-line; /* Respeta los saltos de línea */
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="portada">
        <p class="subtitulo">FELIZ DÍA DE LAS FLORES AMARILLAS</p>
        <h1>PRECIOSA 🥹</h1>
        <p class="subtitulo">TENGO UN REGALO ESPECIAL PARA TI</p>
        <button class="btn-regalo" onclick="mostrarRegalo()">VER TU REGALO</button>
    </div>

    <div id="seccion-flores">
        <div class="flower">
            <div class="center"></div>
            <div class="petal" style="transform: rotate(0deg);"></div>
            <div class="petal" style="transform: rotate(45deg);"></div>
            <div class="petal" style="transform: rotate(90deg);"></div>
            <div class="petal" style="transform: rotate(135deg);"></div>
            <div class="petal" style="transform: rotate(180deg);"></div>
            <div class="petal" style="transform: rotate(225deg);"></div>
            <div class="petal" style="transform: rotate(270deg);"></div>
            <div class="petal" style="transform: rotate(315deg);"></div>
        </div>
        <div class="stem"></div>
        
        <h2 class="mensaje-final">En cada oración, en cada oportunidad 
            que tengo de hablar con Dios, sin duda 
            suelo mencionar tu nombre. Es algo que 
            ya se me ha hecho costumbre y me 
            siento feliz 💌 por ello 💞.
        </h2>

        <audio id="musica" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        function mostrarRegalo() {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('seccion-flores').style.display = 'flex';
            
            var audio = document.getElementById('musica');
            audio.play().catch(function(e) { console.log("Audio activo"); });
        }
    </script>
</body>
</html>
